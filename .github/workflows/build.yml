name: Test Jenesis Tool

on:
  push:
    branches: [main]
  pull_request:

jobs:
  manual:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build: [Manual, Maven, Minimal, Modular, ModularToMaven, Modules]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: ${{ matrix.build }}.java
        shell: bash
        run: java build/${{ matrix.build }}.java

  project:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        layout: [auto, maven, modular, modular_to_maven]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Project layout ${{ matrix.layout }}
        shell: bash
        run: java -Djenesis.project.layout=${{ matrix.layout }} build/jenesis/Project.java stage

  sdk:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Stage Jenesis
        shell: bash
        run: |
          java -Djenesis.buildVersion=0.0.0-TEST \
               -Djenesis.project.sources=true \
               -Djenesis.project.skipTests=true \
               -Djenesis.project.metadata=metadata.properties \
               build/jenesis/Project.java stage

      - name: Populate SDK layout
        shell: bash
        run: |
          mkdir -p sdk/lib sdk/sources
          cp target/stage/output/build/jenesis/build.jenesis/0.0.0-TEST/build.jenesis-0.0.0-TEST.jar sdk/lib/
          cp target/stage/output/build/jenesis/build.jenesis/0.0.0-TEST/build.jenesis-0.0.0-TEST-sources.jar sdk/sources/

      - name: Run SDK tests (POSIX)
        if: runner.os != 'Windows'
        run: bash sdk-tests/test.sh

      - name: Run SDK tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: sdk-tests\test.bat
