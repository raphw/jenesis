name: Test Jenesis Tool

on:
  push:
    branches: [main]
  pull_request:

jobs:
  demos:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # internal-module and external-module are omitted until the next
        # build.jenesis release: they load a build module through the
        # class-loader bridge, which currently rejects the overlay's older
        # build.jenesis against the local sources.
        demo:
          - { dir: java-pom, entry: build/jenesis/Project.java }
          - { dir: java-modular, entry: build/jenesis/Project.java }
          - { dir: java-pom-multi, entry: build/jenesis/Project.java }
          - { dir: kotlin, entry: build/jenesis/Project.java }
          - { dir: scala, entry: build/jenesis/Project.java }
          - { dir: groovy, entry: build/jenesis/Project.java }
          - { dir: custom-assembler, entry: build/Demo.java }
          - { dir: custom-build, entry: build/Demo.java }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Demo ${{ matrix.demo.dir }}
        shell: bash
        working-directory: demo/${{ matrix.demo.dir }}
        run: java ${{ matrix.demo.entry }}

      - name: Upload target on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target-demo-${{ matrix.os }}-${{ matrix.demo.dir }}
          path: demo/${{ matrix.demo.dir }}/target/
          retention-days: 3
          if-no-files-found: ignore

  project:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        layout: [auto, maven, modular, modular_to_maven]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Project layout ${{ matrix.layout }}
        shell: bash
        run: java -Djenesis.project.layout=${{ matrix.layout }} build/jenesis/Project.java stage

      - name: Upload target on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target-project-${{ matrix.os }}-${{ matrix.layout }}
          path: target/
          retention-days: 3
          if-no-files-found: ignore

  sdk:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Stage Jenesis
        shell: bash
        run: |
          java -Djenesis.project.version=0.0.0-TEST \
               -Djenesis.project.sources=true \
               -Djenesis.project.skipTests=true \
               -Djenesis.project.metadata=project.properties \
               build/jenesis/Project.java stage

      - name: Populate SDK layout
        shell: bash
        run: |
          mkdir -p sdk/lib sdk/sources
          cp target/stage/maven/output/build/jenesis/build.jenesis/0.0.0-TEST/build.jenesis-0.0.0-TEST.jar sdk/lib/
          cp target/stage/maven/output/build/jenesis/build.jenesis/0.0.0-TEST/build.jenesis-0.0.0-TEST-sources.jar sdk/sources/

      - name: Run SDK tests (POSIX)
        if: runner.os != 'Windows'
        run: bash sdk-tests/test.sh

      - name: Run SDK tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: sdk-tests\test.bat

      - name: Upload target on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target-sdk-${{ matrix.os }}
          path: target/
          retention-days: 3
          if-no-files-found: ignore
