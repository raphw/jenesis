name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build: [Manual, Maven, Minimal, Modular, ModularByMaven, Modules]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build with (${{ matrix.build }}).java
        run: java build/${{ matrix.build }}.java
