name: Test Jenesis Tool

on:
  push:
    branches: [main]
  pull_request:

# Route Maven Central through the repository variable MAVEN_REPOSITORY_URI when set
# (the Google Cloud mirror of Central, to avoid Central rate-limiting the runners),
# falling back to Central itself so an unset variable never becomes an empty URI.
env:
  MAVEN_REPOSITORY_URI: ${{ vars.MAVEN_REPOSITORY_URI || 'https://repo1.maven.org/maven2/' }}

jobs:
  demos:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        demo:
          - { name: java-pom, dir: demo-01-java-pom, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q .' }
          - { name: java-pom-dependencies, dir: demo-01-java-pom, entry: build/jenesis/Project.java dependencies, verify: 'find target -name graph.properties | grep -q .' }
          - { name: java-modular, dir: demo-02-java-modular, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q .' }
          - { name: java-modular-as-modular, dir: demo-02-java-modular, entry: build/jenesis/Project.java, flags: -Djenesis.project.layout=modular, verify: 'find target -name classes.jar | grep -q .' }
          - { name: java-pom-multi, dir: demo-03-java-pom-multi, entry: build/jenesis/Project.java, verify: 'test "$(find target -name classes.jar | wc -l)" -ge 2' }
          - { name: java-modular-multi, dir: demo-04-java-modular-multi, entry: build/jenesis/Project.java, verify: 'test "$(find target -name classes.jar | wc -l)" -ge 2' }
          - { name: java-modular-multi-as-modular, dir: demo-04-java-modular-multi, entry: build/jenesis/Project.java, flags: -Djenesis.project.layout=modular, verify: 'test "$(find target -name classes.jar | wc -l)" -ge 2' }
          - { name: java-pom-multi-module, dir: demo-03-java-pom-multi, entry: build/jenesis/Project.java +greeter, verify: 'find target -path "*module-greeter*" -name classes.jar | grep -q .' }
          - { name: java-pom-multi-test-filter, dir: demo-03-java-pom-multi, entry: build/jenesis/Project.java, flags: "-Djenesis.test.filter=.*GreeterTest#prefix_is_a_greeting", verify: 'grep -rqs prefix_is_a_greeting target' }
          - { name: java-pom-multi-test-engine, dir: demo-03-java-pom-multi, entry: build/jenesis/Project.java, flags: -Djenesis.test.engine=junit-platform, verify: 'find target -type d -path "*test/executed*" | grep -q .' }
          - { name: java-modular-multi-module, dir: demo-04-java-modular-multi, entry: build/jenesis/Project.java +greeter-test, verify: 'find target -path "*greeter*" -name classes.jar | grep -q .' }
          - { name: java-modular-multi-test-filter, dir: demo-04-java-modular-multi, entry: build/jenesis/Project.java, flags: "-Djenesis.test.filter=.*GreeterTest#prefix_is_a_greeting", verify: 'grep -rqs prefix_is_a_greeting target' }
          - { name: java-modular-jmod-jlink, dir: demo-06-java-modular-executable, entry: build/jenesis/Project.java stage, flags: -Djenesis.project.properties=image, verify: 'find target -name "*.jmod" | grep -q . && find target -path "*bin*" \( -name java -o -name java.exe \) | grep -q .' }
          - { name: java-pom-executable, dir: demo-05-java-pom-executable, entry: build/Demo.java }
          - { name: java-pom-bundle, dir: demo-05-java-pom-executable, entry: build/jenesis/Project.java, flags: -Djenesis.project.properties=bundle, verify: 'find target -type d -name bundle | grep -q .' }
          - { name: java-pom-launcher, dir: demo-05-java-pom-executable, entry: build/DemoLauncher.java }
          - { name: java-pom-launcher-strict, dir: demo-05-java-pom-executable, entry: build/jenesis/Project.java, flags: -Djenesis.project.properties=launcher -Djenesis.dependency.pin=strict, verify: 'find target -path "*launcher*" -name "*.jar" -path "*output*" | grep -q .' }
          - { name: java-modular-executable, dir: demo-06-java-modular-executable, entry: build/Demo.java }
          - { name: java-modular-bundle, dir: demo-06-java-modular-executable, entry: build/jenesis/Project.java, flags: -Djenesis.project.properties=bundle, verify: 'find target -type d -name bundle | grep -q .' }
          - { name: java-modular-launcher, dir: demo-06-java-modular-executable, entry: build/DemoLauncher.java }
          - { name: java-modular-launcher-strict, dir: demo-06-java-modular-executable, entry: build/jenesis/Project.java, flags: -Djenesis.project.properties=launcher -Djenesis.dependency.pin=strict, verify: 'find target -path "*launcher*" -name "*.jar" -path "*output*" | grep -q .' }
          - { name: bundle, dir: demo-07-bundle, entry: build/Demo.java }
          - { name: java-multi-release, dir: demo-08-java-multi-release, entry: build/jenesis/Execute.java }
          - { name: javac-arguments, dir: demo-09-javac-arguments, entry: build/jenesis/Execute.java }
          - { name: annotations, dir: demo-10-annotations, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q .' }
          - { name: java-quality, dir: demo-11-java-quality, entry: build/jenesis/Project.java, verify: 'find target -type d -name checkstyle | grep -q . && find target -type d -name pmd | grep -q . && find target -type d -name spotbugs | grep -q .' }
          - { name: kotlin, dir: demo-16-kotlin, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q .' }
          - { name: kotlin-documentation, dir: demo-16-kotlin, entry: build/jenesis/Project.java, flags: -Djenesis.project.documentation=true, verify: 'find target -type d -name documentation | grep -q .' }
          - { name: kotlin-quality, dir: demo-17-kotlin-quality, entry: build/jenesis/Project.java, verify: 'find target -type d -name detekt | grep -q . && find target -type d -name ktlint | grep -q .' }
          - { name: scala, dir: demo-19-scala, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q .' }
          - { name: scala-documentation, dir: demo-19-scala, entry: build/jenesis/Project.java, flags: -Djenesis.project.documentation=true, verify: 'find target -type d -name documentation | grep -q .' }
          - { name: scala-quality, dir: demo-20-scala-quality, entry: build/jenesis/Project.java, verify: 'find target -type d -name scalastyle | grep -q .' }
          - { name: groovy, dir: demo-21-groovy, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q .' }
          - { name: groovy-documentation, dir: demo-21-groovy, entry: build/jenesis/Project.java, flags: -Djenesis.project.documentation=true, verify: 'find target -type d -name documentation | grep -q .' }
          - { name: groovy-quality, dir: demo-22-groovy-quality, entry: build/jenesis/Project.java, verify: 'find target -type d -name codenarc | grep -q .' }
          - { name: code-coverage, dir: demo-23-code-coverage, entry: build/jenesis/Project.java, verify: 'find target -type d -path "*jacoco*" | grep -q .' }
          - { name: maven-exclusions, dir: demo-26-maven-exclusions, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q . && ! find target -path "*resolved*" -name "commons-lang3*" | grep -q .' }
          - { name: module-layout, dir: demo-27-module-layout, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q .' }
          - { name: module-classifier, dir: demo-28-module-classifier, entry: build/jenesis/Execute.java }
          - { name: platform-guard, dir: demo-29-platform-guard, entry: build/jenesis/Execute.java }
          - { name: platform-guard-legacy, dir: demo-29-platform-guard, entry: build/jenesis/Execute.java, flags: -Djenesis.platform.legacy=true }
          - { name: platform-guard-pom, dir: demo-30-platform-guard-pom, entry: build/jenesis/Execute.java }
          - { name: platform-guard-pom-legacy, dir: demo-30-platform-guard-pom, entry: build/jenesis/Execute.java, flags: -Djenesis.platform.legacy=true }
          - { name: custom-assembler, dir: demo-31-custom-assembler, entry: build/Demo.java }
          - { name: custom-jmod, dir: demo-32-custom-jmod, entry: build/Demo.java }
          - { name: internal-module, dir: demo-33-internal-module, entry: build/Demo.java }
          - { name: external-module, dir: demo-34-external-module, entry: build/Demo.java }
          - { name: custom-maven, dir: demo-35-custom-maven, entry: build/Demo.java }
          - { name: custom-modular, dir: demo-36-custom-modular, entry: build/Demo.java }
          - { name: custom-build, dir: demo-37-custom-build, entry: build/Demo.java }
          - { name: supply-chain-security, dir: demo-39-supply-chain-security, entry: build/Demo.java }
          - { name: publishing, dir: demo-40-publishing, entry: build/Demo.java }
          - { name: kotlin-plugin, dir: demo-18-kotlin-plugin, entry: build/jenesis/Project.java, verify: 'find target -name classes.jar | grep -q .' }
          - { name: sbom, dir: demo-12-sbom, entry: build/jenesis/Project.java, verify: 'find target -name "*.cdx.json" | grep -q .' }
          - { name: compliance, dir: demo-13-compliance, entry: build/Demo.java }
          - { name: vulnerabilities, dir: demo-14-vulnerabilities, entry: build/Demo.java }
          - { name: profiles, dir: demo-15-profiles, entry: build/jenesis/Project.java, flags: -Djenesis.project.properties=release, verify: 'find target -type d -path "*assemble/sources*" | grep -q .' }
          - { name: test-selection, dir: demo-24-test-selection, entry: build/Demo.java }
          - { name: pitest, dir: demo-25-pitest, entry: build/jenesis/Project.java, verify: 'find target -type d -name mutate | grep -q .' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Demo ${{ matrix.demo.name }}
        shell: bash
        working-directory: demo/${{ matrix.demo.dir }}
        run: java ${{ matrix.demo.flags }} ${{ matrix.demo.entry }}

      - name: Verify ${{ matrix.demo.name }}
        if: matrix.demo.verify
        shell: bash
        working-directory: demo/${{ matrix.demo.dir }}
        run: ${{ matrix.demo.verify }}

      - name: Upload target on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target-demo-${{ matrix.os }}-${{ matrix.demo.name }}
          path: demo/${{ matrix.demo.dir }}/target/
          retention-days: 3
          if-no-files-found: ignore

  project:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        layout: [auto, maven, modular, modular_to_maven]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Project layout ${{ matrix.layout }}
        shell: bash
        run: java -Djenesis.project.layout=${{ matrix.layout }} build/jenesis/Project.java stage

      - name: Upload target on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target-project-${{ matrix.os }}-${{ matrix.layout }}
          path: target/
          retention-days: 3
          if-no-files-found: ignore

  sdk:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Stage Jenesis
        shell: bash
        run: |
          java -Djenesis.project.version=0.0.0-TEST \
               -Djenesis.project.sources=true \
               -Djenesis.test.skip=true \
               -Djenesis.project.metadata=project.properties \
               build/jenesis/Project.java stage

      - name: Populate SDK layout
        shell: bash
        run: |
          mkdir -p sdk/jenesis/lib sdk/jenesis/sources sdk/jpx/lib
          cp target/stage/maven/output/build/jenesis/build.jenesis/0.0.0-TEST/build.jenesis-0.0.0-TEST.jar sdk/jenesis/lib/
          cp target/stage/maven/output/build/jenesis/build.jenesis/0.0.0-TEST/build.jenesis-0.0.0-TEST-sources.jar sdk/jenesis/sources/
          cp target/stage/maven/output/build/jenesis/build.jenesis/0.0.0-TEST/build.jenesis-0.0.0-TEST.jar sdk/jpx/lib/

      - name: Run SDK tests (POSIX)
        if: runner.os != 'Windows'
        run: bash sdk/jenesis/tests/test.sh

      - name: Run SDK tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: sdk\jenesis\tests\test.bat

      - name: Run jpx SDK tests (POSIX)
        if: runner.os != 'Windows'
        run: bash sdk/jpx/tests/test.sh

      - name: Run jpx SDK tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: sdk\jpx\tests\test.bat

      - name: Upload target on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target-sdk-${{ matrix.os }}
          path: target/
          retention-days: 3
          if-no-files-found: ignore
