name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Parse release version from commit message
        id: ver
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"
          VERSION="$(printf '%s\n' "$MESSAGE" | head -n1 | sed -E 's/^\[release\][[:space:]]+//' | awk '{print $1}')"
          if [ -z "$VERSION" ]; then
            echo "Commit message must be: [release] <version>" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Build artifacts
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          java -Djenesis.buildVersion=${VERSION} \
               -Djenesis.project.sources=true \
               -Djenesis.project.docs=true \
               -Djenesis.project.pom=true \
               build/jenesis/Project.java collect

      - name: Stage main module in Maven layout
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          DEST="out/staging-deploy/build/jenesis/jenesis/${VERSION}"
          mkdir -p "${DEST}"
          cp target/collect/output/module-sources/classes.jar "${DEST}/jenesis-${VERSION}.jar"
          cp target/collect/output/module-sources/sources.jar "${DEST}/jenesis-${VERSION}-sources.jar"
          cp target/collect/output/module-sources/javadoc.jar "${DEST}/jenesis-${VERSION}-javadoc.jar"
          cp target/collect/output/module-sources/pom.xml     "${DEST}/jenesis-${VERSION}.pom"

      - name: JReleaser deploy
        uses: jreleaser/release-action@v2
        with:
          version: latest
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.ver.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVEN_CENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVEN_CENTRAL_SONATYPE_TOKEN:    ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-logs
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
