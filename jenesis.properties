# Build Jenesis as MODULAR_TO_MAVEN rather than letting auto-detection pick MAVEN
# because a pom.xml is present. The engine carries a module-info.java, so this emits
# the modular jar (published to the local module repository on `export`, where modular
# consumers such as jenesis-cache resolve `requires build.jenesis`) alongside the
# Maven jar and pom the release pipeline ships. The pom still supplies the coordinates
# and version, so both artifacts stay build.jenesis 0-SNAPSHOT.
jenesis.project.layout=modular_to_maven
