project:
  name: jenesis
  description: A Java-native build tool.
  authors: [Rafael Winterhalter]
  license: Apache-2.0
  links:
    homepage: https://github.com/raphw/jenesis
  languages:
    java:
      groupId: build.jenesis
      artifactId: jenesis
      version: '25'

signing:
  active: ALWAYS
  pgp:
    armored: true
    mode: MEMORY

release:
  github:
    owner: raphw
    name: jenesis
    branch: main
    branchPush: main
    skipRelease: false
    skipTag: false
    tagName: 'v{{projectVersion}}'

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        applyMavenCentralRules: true
        stagingRepositories:
          - target/stage/output
