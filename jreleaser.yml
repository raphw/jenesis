project:
  name: jenesis
  description: A Java-native build tool.
  authors: [Rafael Winterhalter]
  license: Apache-2.0
  links:
    homepage: https://github.com/raphw/jenesis
  languages:
    java:
      groupId: build.jenesis
      artifactId: jenesis
      version: '25'
      mainClass: build.jenesis.Project

signing:
  active: ALWAYS
  pgp:
    armored: true
    mode: MEMORY

release:
  github:
    owner: raphw
    name: jenesis
    branch: main
    branchPush: main
    skipRelease: false
    skipTag: false
    tagName: 'v{{projectVersion}}'

files:
  artifacts:
    - path: 'target/stage/maven/output/build/jenesis/build.jenesis/{{projectVersion}}/build.jenesis-{{projectVersion}}.jar'
    - path: 'target/stage/maven/output/build/jenesis/build.jenesis/{{projectVersion}}/build.jenesis-{{projectVersion}}-sources.jar'

# The sdk zip is the distribution artifact: uploaded to the GitHub release like any
# file, and then published to SDKMAN by the packager (release + set as default -
# what the sdkman-release-action and sdkman-default-action steps used to do).
distributions:
  jenesis:
    type: JAVA_BINARY
    artifacts:
      - path: 'sdk/jenesis-{{projectVersion}}.zip'
    sdkman:
      active: ALWAYS
      candidate: jenesis
      command: MAJOR
      releaseNotesUrl: 'https://github.com/raphw/jenesis/releases/tag/v{{projectVersion}}'

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        applyMavenCentralRules: true
        stagingRepositories:
          - target/stage/maven/output

# Broadcast the release on SDKMAN's channels (same vendor credentials as the packager).
announce:
  sdkman:
    active: ALWAYS
