# Optional. Extends the built-in tables the resolver uses to normalise and
# classify dependency licenses. Every license in this demo (Apache-2.0 and
# GPL-2.0) is already recognised by the built-in tables, so this file does not
# change the outcome here - it is shipped only to document the format.
#
# alias/<declared name> = <SPDX id>
#   Maps a license name as it appears in a POM to its canonical SPDX identifier.
#   Spaces in a key are escaped with a backslash, per standard .properties rules.
alias/apache\ license\ 2.0 = Apache-2.0

# category/<SPDX id> = <permissiveness>
#   Buckets an SPDX identifier as one of:
#     permissive | weak-copyleft | strong-copyleft | network-copyleft | public-domain
#   The allowed=permissive policy in licensing.properties is matched against these.
category/Apache-2.0 = permissive
